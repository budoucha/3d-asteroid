<script>
"use strict";

/* ============================================================
 * 3D ASTEROID
 * 赤青（アナグリフ）3Dメガネ対応ベルトスクロールアクション
 * 左目=赤フィルター / 右目=シアンフィルター を想定
 * ============================================================ */

const cvs = document.getElementById("cv");
const ctx = cvs.getContext("2d");
const affiliateLink = document.getElementById("affiliateLink");
const touchControls = document.getElementById("touchControls");
const moveStick = document.getElementById("moveStick");
const settingsPanel = document.getElementById("settingsPanel");
const touchButtons = [...touchControls.querySelectorAll(".ctrl-btn")];
const mobileQuery = window.matchMedia("(hover: none), (pointer: coarse), (max-width: 760px)");

/* ---------- 効果音 ---------- */
let audioCtx = null;
let masterGain = null;
let boostSound = null;
let lastPassSfxAt = 0;
let lastSparkSfxAt = 0;

function ensureAudio() {
  if (audioCtx) return audioCtx;
  const AudioCtor = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtor) return null;
  audioCtx = new AudioCtor();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.18;
  masterGain.connect(audioCtx.destination);
  return audioCtx;
}

function unlockAudio() {
  const ac = ensureAudio();
  if (!ac) return;
  if (ac.state === "suspended") ac.resume();
}

function usableAudio() {
  return audioCtx && masterGain ? audioCtx : null;
}

function tone(freq, duration, opts = {}) {
  const ac = usableAudio();
  if (!ac) return;
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const volume = opts.gain ?? 0.18;
  const attack = opts.attack ?? 0.006;
  const endFreq = opts.endFreq ?? freq;
  osc.type = opts.type || "sine";
  osc.frequency.setValueAtTime(freq, now);
  if (endFreq !== freq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), now + duration);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), now + attack);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}

function noise(duration, opts = {}) {
  const ac = usableAudio();
  if (!ac) return;
  const now = ac.currentTime;
  const length = Math.max(1, Math.floor(ac.sampleRate * duration));
  const buffer = ac.createBuffer(1, length, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  const filter = ac.createBiquadFilter();
  const gain = ac.createGain();
  src.buffer = buffer;
  filter.type = opts.filterType || "lowpass";
  filter.frequency.value = opts.filterFreq || 900;
  gain.gain.setValueAtTime(opts.gain ?? 0.16, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start(now);
  src.stop(now + duration);
}

function playSfx(name) {
  const ac = usableAudio();
  if (!ac) return;
  const now = ac.currentTime;
  if (name === "start") {
    tone(220, 0.16, { type: "sawtooth", endFreq: 660, gain: 0.16 });
    tone(440, 0.18, { type: "triangle", endFreq: 880, gain: 0.08 });
  } else if (name === "pause") {
    tone(520, 0.08, { type: "square", endFreq: 320, gain: 0.08 });
  } else if (name === "resume") {
    tone(320, 0.08, { type: "square", endFreq: 520, gain: 0.08 });
  } else if (name === "ui") {
    tone(740, 0.04, { type: "triangle", endFreq: 980, gain: 0.05 });
  } else if (name === "pass") {
    if (now - lastPassSfxAt < 0.08) return;
    lastPassSfxAt = now;
    tone(680, 0.055, { type: "triangle", endFreq: 920, gain: 0.035 });
  } else if (name === "spark") {
    if (now - lastSparkSfxAt < 0.08) return;
    lastSparkSfxAt = now;
    noise(0.06, { gain: 0.045, filterFreq: 2100, filterType: "bandpass" });
  } else if (name === "nearMiss") {
    tone(960, 0.09, { type: "triangle", endFreq: 520, gain: 0.07 });
    noise(0.05, { gain: 0.035, filterFreq: 2600, filterType: "highpass" });
  } else if (name === "dopamine") {
    tone(180, 0.28, { type: "sawtooth", endFreq: 720, gain: 0.12 });
    tone(540, 0.2, { type: "triangle", endFreq: 1080, gain: 0.08 });
    noise(0.14, { gain: 0.05, filterFreq: 1800, filterType: "highpass" });
  } else if (name === "hit") {
    tone(120, 0.22, { type: "sawtooth", endFreq: 52, gain: 0.16 });
    noise(0.18, { gain: 0.17, filterFreq: 650 });
  } else if (name === "gameOver") {
    tone(180, 0.45, { type: "sawtooth", endFreq: 42, gain: 0.18 });
    noise(0.32, { gain: 0.13, filterFreq: 420 });
  }
}

function startBoostSound() {
  const ac = usableAudio();
  if (!ac || boostSound) return;
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  osc.type = "sawtooth";
  osc.frequency.value = 82;
  filter.type = "lowpass";
  filter.frequency.value = 240;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.055, now + 0.08);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  boostSound = { osc, gain, filter };
}

function stopBoostSound() {
  const ac = usableAudio();
  if (!ac || !boostSound) {
    boostSound = null;
    return;
  }
  const now = ac.currentTime;
  boostSound.gain.gain.cancelScheduledValues(now);
  boostSound.gain.gain.setValueAtTime(Math.max(0.0001, boostSound.gain.gain.value), now);
  boostSound.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
  boostSound.osc.stop(now + 0.14);
  boostSound = null;
}

function syncBoostSound() {
  const ac = usableAudio();
  if (!ac) return;
  if (state === ST_PLAY && !paused && boostInputActive()) {
    startBoostSound();
    if (boostSound) {
      const now = ac.currentTime;
      const amt = boostAmount();
      boostSound.osc.frequency.setTargetAtTime(82 + amt * 70, now, 0.05);
      boostSound.filter.frequency.setTargetAtTime(240 + amt * 520, now, 0.05);
      boostSound.gain.gain.setTargetAtTime(0.045 + amt * 0.04, now, 0.04);
    }
  } else {
    stopBoostSound();
  }
}

function syncAffiliateLink() {
  const showGameOverLink = state === ST_OVER && gameOverFlow <= 0;
  affiliateLink.classList.toggle("is-visible", state === ST_TITLE || showGameOverLink);
}
affiliateLink.addEventListener("pointerdown", e => e.stopPropagation());

function syncTouchControls() {
  const visible = state === ST_PLAY && mobileQuery.matches;
  touchControls.classList.toggle("is-visible", visible);
  touchControls.setAttribute("aria-hidden", visible ? "false" : "true");
  const pauseButton = touchControls.querySelector('[data-action="pause"]');
  const anaglyphButton = touchControls.querySelector('[data-action="anaglyph"]');
  const settingsButton = touchControls.querySelector('[data-action="settings"]');
  pauseButton.textContent = paused ? "▶" : "Ⅱ";
  pauseButton.setAttribute("aria-label", paused ? "再開" : "一時停止");
  anaglyphButton.textContent = anaglyph ? "3D" : "2D";
  anaglyphButton.setAttribute("aria-pressed", String(anaglyph));
  settingsPanel.classList.toggle("is-open", visible && settingsOpen);
  settingsButton.setAttribute("aria-expanded", String(visible && settingsOpen));
  settingsButton.setAttribute("aria-pressed", String(visible && settingsOpen));
  const knobX = joystick.x * JOYSTICK_RANGE;
  const knobY = joystick.y * JOYSTICK_RANGE;
  const amount = Math.min(1, Math.hypot(joystick.x, joystick.y));
  moveStick.style.setProperty("--stick-x", knobX.toFixed(1) + "px");
  moveStick.style.setProperty("--stick-y", knobY.toFixed(1) + "px");
  moveStick.classList.toggle("is-active", joystick.active);
  moveStick.setAttribute("aria-valuenow", String(Math.round(amount * 100)));
  moveStick.setAttribute("aria-valuetext", amount > 0.01 ? "入力中" : "中央");
  for (const btn of touchButtons) {
    const key = btn.dataset.hold;
    if (!key) continue;
    const active = !!keys[key];
    btn.classList.toggle("is-held", active);
    btn.setAttribute("aria-pressed", String(active));
  }
}

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = W * DPR;
  cvs.height = H * DPR;
  cvs.style.width = W + "px";
  cvs.style.height = H + "px";
}
window.addEventListener("resize", resize);
resize();

/* ---------- 3D 投影パラメータ ---------- */
const Z0   = 1000;   // スクリーン面（視差ゼロ）の奥行き = 自機の位置
const ZFAR = 9000;   // 隕石の出現距離
const ZCUT = 520;    // これより手前に来た隕石は消滅（飛び出し演出）
let   EYE  = 14;     // 無限遠での片目視差(px)。大きいほど立体感が強い

function focal() { return H * 1.15; }

// 眼 d = -1(左/赤) or +1(右/シアン)。d=0 でモノラル描画
function proj(x, y, z, d) {
  const f = focal();
  const s = f / z;
  return {
    x: W / 2 + x * s + d * EYE * (1 - Z0 / z),
    y: H / 2 + y * s,
    s: s
  };
}
// 自機プレーンでの移動可能範囲（ワールド座標）
function limX() { return (W / 2) * Z0 / focal() * 0.88; }
function limY() { return (H / 2) * Z0 / focal() * 0.80; }

/* ---------- ゲーム状態 ---------- */
const ST_TITLE = 0, ST_PLAY = 1, ST_OVER = 2;
const GAME_OVER_FLOW_TIME = 1.3;
const DOPAMINE_BOOST_TIME = 5;
const DOPAMINE_SCORE_MULT = 1.5;
const DOPAMINE_FLASH_TIME = 0.22;
const DOPAMINE_RING_TIME = 0.55;
const DOPAMINE_CLEAR_Z_MAX = 2800;
const DOPAMINE_CLEAR_RADIUS_MUL = 0.9;
const NEAR_MISS_MARGIN = 55;
const NEAR_MISS_COOLDOWN = 0.9;
const NEAR_MISS_RING_TIME = 0.38;
const NEAR_MISS_CLEAR_RADIUS_MUL = 0.55;
let state = ST_TITLE;
let anaglyph = true;          // Gキーで2D表示に切替可能
let paused = false;
let settingsOpen = false;

const player = { x: 0, y: 0, r: 46, lives: 3, inv: 0, leanX: 0, leanY: 0, trail: [] };
let meteors = [];
let particles = [];
let stars = [];
let score = 0, best = +(localStorage.getItem("mr3d_best") || 0);
let playTime = 0, spawnTimer = 0, shake = 0;
let gameOverFlow = 0;          // 撃墜後に爆散と背景流れを見せる余韻
let boost = 1;                 // 加速入力の演出・報酬倍率（1=通常、Zキーで上昇）
let boostHoldTime = 0;          // Z加速を途切れずに続けている時間
let boostCanceledUntilRelease = false;
let dopamineWasActive = false;
let dopamineFlash = 0;
let dopamineRings = [];
let nearMissCooldown = 0;
const BOOST_MAX = 2.2;         // 加速時の最大倍率
const STAR_STREAK_Z_MAX = 700; // 星の残像が奥側へ伸びる最大z距離
const STAR_STREAK_TIME = 0.085;// 残像距離を速度へ読み替える見かけの時間幅
let worldMul = 1;              // 隕石接近・グリッド流れ専用の倍率

const keys = {};
const keyboardKeys = {};
const touchKeyPointers = new Map();
const JOYSTICK_RANGE = 32;
const JOYSTICK_DEADZONE = 0.12;
const joystick = { x: 0, y: 0, active: false, pointerId: null };

function syncKey(key) {
  const touchPointers = touchKeyPointers.get(key);
  keys[key] = !!keyboardKeys[key] || !!(touchPointers && touchPointers.size);
}

function setKeyboardKey(key, down) {
  keyboardKeys[key] = down;
  syncKey(key);
}

function setTouchKey(key, pointerId, down) {
  let touchPointers = touchKeyPointers.get(key);
  if (!touchPointers) {
    touchPointers = new Set();
    touchKeyPointers.set(key, touchPointers);
  }
  if (down) touchPointers.add(pointerId);
  else touchPointers.delete(pointerId);
  syncKey(key);
}

function clearAllInput() {
  for (const key of Object.keys(keyboardKeys)) keyboardKeys[key] = false;
  touchKeyPointers.clear();
  for (const key of Object.keys(keys)) keys[key] = false;
  boostCanceledUntilRelease = false;
  resetJoystick();
}

window.addEventListener("keydown", e => {
  unlockAudio();
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  setKeyboardKey(e.key.toLowerCase(), true);
  if (e.key === " " && !e.repeat) {
    if (state === ST_PLAY) {
      paused = !paused;
      playSfx(paused ? "pause" : "resume");
    } else {
      startGame();
    }
  }
  if (e.key.toLowerCase() === "g") {
    anaglyph = !anaglyph;
    playSfx("ui");
  }
  if (e.key === "+" || e.key === "=") {
    EYE = Math.min(EYE + 2, 30);
    playSfx("ui");
  }
  if (e.key === "-") {
    EYE = Math.max(EYE - 2, 4);
    playSfx("ui");
  }
});
window.addEventListener("keyup", e => { setKeyboardKey(e.key.toLowerCase(), false); });
window.addEventListener("blur", () => {
  clearAllInput();
  if (state === ST_PLAY) paused = true;
  stopBoostSound();
});

// タッチ / マウスドラッグ操作
let pointer = null;
cvs.addEventListener("pointerdown", e => {
  unlockAudio();
  if (state !== ST_PLAY) { startGame(); return; }
  pointer = { x: e.clientX, y: e.clientY };
});
cvs.addEventListener("pointermove", e => {
  if (pointer) pointer = { x: e.clientX, y: e.clientY };
});
window.addEventListener("pointerup", () => { pointer = null; });

function updateJoystickFromPointer(e) {
  const rect = moveStick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const max = Math.min(rect.width, rect.height) * 0.5 - 20;
  let dx = e.clientX - cx;
  let dy = e.clientY - cy;
  const dist = Math.hypot(dx, dy);
  if (dist > max) {
    dx = dx / dist * max;
    dy = dy / dist * max;
  }
  let nx = max > 0 ? dx / max : 0;
  let ny = max > 0 ? dy / max : 0;
  const amount = Math.hypot(nx, ny);
  if (amount < JOYSTICK_DEADZONE) {
    nx = 0;
    ny = 0;
  } else {
    const scaled = (amount - JOYSTICK_DEADZONE) / (1 - JOYSTICK_DEADZONE);
    nx = nx / amount * scaled;
    ny = ny / amount * scaled;
  }
  joystick.x = nx;
  joystick.y = ny;
  joystick.active = true;
  syncTouchControls();
}

function resetJoystick() {
  joystick.x = 0;
  joystick.y = 0;
  joystick.active = false;
  joystick.pointerId = null;
  if (typeof moveStick !== "undefined") syncTouchControls();
}

moveStick.addEventListener("pointerdown", e => {
  unlockAudio();
  e.preventDefault();
  e.stopPropagation();
  pointer = null;
  joystick.pointerId = e.pointerId;
  moveStick.setPointerCapture?.(e.pointerId);
  updateJoystickFromPointer(e);
});

moveStick.addEventListener("pointermove", e => {
  if (joystick.pointerId !== e.pointerId) return;
  e.preventDefault();
  e.stopPropagation();
  updateJoystickFromPointer(e);
});

moveStick.addEventListener("pointerup", e => {
  if (joystick.pointerId !== e.pointerId) return;
  e.preventDefault();
  e.stopPropagation();
  resetJoystick();
});

moveStick.addEventListener("pointercancel", e => {
  if (joystick.pointerId === e.pointerId) resetJoystick();
});

moveStick.addEventListener("lostpointercapture", e => {
  if (joystick.pointerId === e.pointerId) resetJoystick();
});

function runTouchAction(action) {
  if (action === "pause") {
    if (state === ST_PLAY) {
      paused = !paused;
      playSfx(paused ? "pause" : "resume");
    } else {
      startGame();
    }
  } else if (action === "settings") {
    settingsOpen = !settingsOpen;
    playSfx("ui");
  } else if (action === "anaglyph") {
    anaglyph = !anaglyph;
    playSfx("ui");
  } else if (action === "eyeUp") {
    EYE = Math.min(EYE + 2, 30);
    playSfx("ui");
  } else if (action === "eyeDown") {
    EYE = Math.max(EYE - 2, 4);
    playSfx("ui");
  }
  syncTouchControls();
}

for (const btn of touchButtons) {
  btn.addEventListener("pointerdown", e => {
    unlockAudio();
    e.preventDefault();
    e.stopPropagation();
    pointer = null;
    btn.setPointerCapture?.(e.pointerId);
    if (btn.dataset.hold) setTouchKey(btn.dataset.hold, e.pointerId, true);
    if (btn.dataset.action) runTouchAction(btn.dataset.action);
  });
  btn.addEventListener("pointerup", e => {
    e.preventDefault();
    e.stopPropagation();
    if (btn.dataset.hold) setTouchKey(btn.dataset.hold, e.pointerId, false);
  });
  btn.addEventListener("pointercancel", e => {
    if (btn.dataset.hold) setTouchKey(btn.dataset.hold, e.pointerId, false);
  });
  btn.addEventListener("lostpointercapture", e => {
    if (btn.dataset.hold) setTouchKey(btn.dataset.hold, e.pointerId, false);
  });
}

/* ---------- 初期化 ---------- */
function initStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2 * limX() * 6,
      y: (Math.random() - 0.5) * 2 * limY() * 6,
      z: Z0 + Math.random() * (ZFAR - Z0)
    });
  }
}
initStars();

function startGame() {
  playSfx("start");
  state = ST_PLAY;
  paused = false;
  settingsOpen = false;
  syncAffiliateLink();
  syncTouchControls();
  meteors = [];
  particles = [];
  score = 0;
  playTime = 0;
  spawnTimer = 0;
  gameOverFlow = 0;
  player.x = 0; player.y = limY() * 0.5;
  player.lives = 3; player.inv = 2;
  player.leanX = 0; player.leanY = 0; player.trail = [];
  boost = 1; boostHoldTime = 0; boostCanceledUntilRelease = false; worldMul = 1;
  dopamineWasActive = false; dopamineFlash = 0; dopamineRings = []; nearMissCooldown = 0;
  pointer = null;
}

function spawnMeteor() {
  const r = 25 + Math.random() * 105;
  const verts = [];
  const n = 10;
  for (let i = 0; i < n; i++) verts.push(0.72 + Math.random() * 0.42);
  meteors.push({
    x: (Math.random() - 0.5) * 2 * limX() * 1.05,
    y: (Math.random() - 0.5) * 2 * limY() * 1.05,
    z: ZFAR,
    r, verts,
    vzMul: 0.6 + Math.random(),   // 個体ごとの速度ばらつき(0.6〜1.6倍)
    vx: (Math.random() - 0.5) * 2 * 160,   // 上下左右方向の初速（横）
    vy: (Math.random() - 0.5) * 2 * 130,   // 同（縦）
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 3,
    passed: false
  });
}

function explode(x, y, z, big) {
  const n = big ? 42 : 24;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 180 + Math.random() * 560;
    particles.push({
      x, y, z,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      vz: (Math.random() - 0.5) * 1100,
      life: 0.6 + Math.random() * 0.6,
      r: 9 + Math.random() * 18
    });
  }
  shake = big ? 0.6 : 0.28;
}

// 隕石同士がぶつかった時の小さな火花
function collideBurst(x, y, z) {
  playSfx("spark");
  const n = 8 + (Math.random() * 5 | 0);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 150 + Math.random() * 340;
    particles.push({
      x, y, z,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      vz: (Math.random() - 0.5) * 650,
      life: 0.38 + Math.random() * 0.35,
      r: 6 + Math.random() * 9
    });
  }
}

/* ---------- 更新 ---------- */
function meteorSpeed() { return Math.min(1700 + playTime * 55, 4300); }
function spawnInterval() { return Math.max(0.5 - playTime * 0.010, 0.15); }
function boostAmount() { return (boost - 1) / (BOOST_MAX - 1); }
function boostInputActive() { return keys["z"] && !boostCanceledUntilRelease; }
function dopamineActive() { return boostInputActive() && boostHoldTime >= DOPAMINE_BOOST_TIME; }
function scoreMultiplier() { return dopamineActive() ? DOPAMINE_SCORE_MULT : 1; }
function targetWorldMul(vz) {
  const trailImpliedSpeed = STAR_STREAK_Z_MAX / STAR_STREAK_TIME;
  return 1 + boostAmount() * (trailImpliedSpeed / vz);
}
function forceCancelBoost() {
  boostCanceledUntilRelease = true;
  boost = 1;
  boostHoldTime = 0;
  worldMul = 1;
  dopamineWasActive = false;
  dopamineFlash = 0;
  dopamineRings = [];
  nearMissCooldown = 0;
  stopBoostSound();
}

function clearNearbyMeteors(x, y, radiusMul = DOPAMINE_CLEAR_RADIUS_MUL, except = null) {
  const clearRadius = Math.max(limX(), limY()) * radiusMul;
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    if (m === except) continue;
    if (m.z > DOPAMINE_CLEAR_Z_MAX) continue;
    if (Math.hypot(m.x - x, m.y - y) > clearRadius + m.r) continue;
    explode(m.x, m.y, m.z, false);
    meteors.splice(i, 1);
  }
}

function triggerNearMissBurst(x, y, except = null) {
  playSfx("nearMiss");
  nearMissCooldown = NEAR_MISS_COOLDOWN;
  dopamineRings.push({ x, y, z: Z0, age: 0, life: NEAR_MISS_RING_TIME, scale: 0.72 });
  clearNearbyMeteors(x, y, NEAR_MISS_CLEAR_RADIUS_MUL, except);
}

// 機体ローカル座標 → ワールド座標（バンク・ピッチの傾きを反映）
// 描画と軌跡記録で共通に使い、翼端位置のズレを防ぐ
function shipPt(mx, my, mz) {
  const bank = player.leanX * 0.5, pitch = player.leanY * 0.18;
  const cb = Math.cos(bank), sb = Math.sin(bank);
  const sr = player.r;
  return {
    x: player.x + (mx * cb - my * sb) * sr,
    y: player.y + (mx * sb + my * cb + pitch * mz) * sr,
    z: Z0 + mz * sr
  };
}

function update(dt) {
  playTime += dt;
  if (!keys["z"]) boostCanceledUntilRelease = false;
  const boostActive = boostInputActive();
  // 加速（ブースト）: Zキー押下で速度・出現・得点率が上昇（衝突リスクと引き換え）
  const boostTarget = boostActive ? BOOST_MAX : 1;
  boost += (boostTarget - boost) * Math.min(1, dt * 6);
  boostHoldTime = boostActive ? boostHoldTime + dt : 0;
  const hotNow = dopamineActive();
  if (hotNow && !dopamineWasActive) {
    playSfx("dopamine");
    dopamineFlash = DOPAMINE_FLASH_TIME;
    dopamineRings.push({ x: player.x, y: player.y, z: Z0, age: 0, life: DOPAMINE_RING_TIME });
    clearNearbyMeteors(player.x, player.y);
  }
  dopamineWasActive = hotNow;
  if (dopamineFlash > 0) dopamineFlash = Math.max(0, dopamineFlash - dt);
  if (nearMissCooldown > 0) nearMissCooldown = Math.max(0, nearMissCooldown - dt);
  for (let i = dopamineRings.length - 1; i >= 0; i--) {
    const r = dopamineRings[i];
    r.age += dt;
    if (r.age >= r.life) dopamineRings.splice(i, 1);
  }
  const vz = meteorSpeed();
  // 星の残像距離が暗示する速度に、隕石接近・グリッド流れを合わせる
  const worldMulTarget = boostActive ? targetWorldMul(vz) : 1;
  const worldEase = worldMulTarget > worldMul ? 10 : 6;
  worldMul += (worldMulTarget - worldMul) * Math.min(1, dt * worldEase);
  score += dt * 25 * boost * scoreMultiplier();
  if (shake > 0) shake = Math.max(0, shake - dt * 2);

  // 自機操作（Shiftで低速・精密移動）
  const maxSp = limX() * 1.6;
  const sp = maxSp * (keys["shift"] ? 0.35 : 1);
  const px0 = player.x, py0 = player.y;
  let dx = 0, dy = 0;
  if (keys["arrowleft"]  || keys["a"]) dx -= 1;
  if (keys["arrowright"] || keys["d"]) dx += 1;
  if (keys["arrowup"]    || keys["w"]) dy -= 1;
  if (keys["arrowdown"]  || keys["s"]) dy += 1;
  dx += joystick.x;
  dy += joystick.y;
  player.x += dx * sp * dt;
  player.y += dy * sp * dt;
  if (pointer) {
    // 画面座標→ワールド座標へ変換して追従
    const f = focal();
    const tx = (pointer.x - W / 2) * Z0 / f;
    const ty = (pointer.y - H / 2) * Z0 / f;
    player.x += (tx - player.x) * Math.min(1, dt * 10);
    player.y += (ty - player.y) * Math.min(1, dt * 10);
  }
  player.x = Math.max(-limX(), Math.min(limX(), player.x));
  player.y = Math.max(-limY(), Math.min(limY(), player.y));
  if (player.inv > 0) player.inv -= dt;

  // 移動方向に応じた機体の傾き（実移動速度から算出）
  const clamp1 = v => Math.max(-1, Math.min(1, v));
  const tgtLeanX = clamp1((player.x - px0) / dt / maxSp);
  const tgtLeanY = clamp1((player.y - py0) / dt / maxSp);
  player.leanX += (tgtLeanX - player.leanX) * Math.min(1, dt * 8);
  player.leanY += (tgtLeanY - player.leanY) * Math.min(1, dt * 8);

  // 既存の軌跡点を機体後方（視点側）へ流す → 静止時も後ろへ尾を引く
  // 加速中は速く流れ、より遠くまで＝軌跡が長く伸びる
  const bAmt = boostAmount();
  const trailCut = Z0 - (320 + bAmt * 600);
  for (const t of player.trail) t.z -= 800 * boost * dt;
  while (player.trail.length && player.trail[0].z < trailCut) player.trail.shift();
  // 傾きを反映した翼端の現在位置を記録（起点が常に翼端と一致する）
  const tipL = shipPt(-1.5, 0.4, -0.5), tipR = shipPt(1.5, 0.4, -0.5);
  player.trail.push({ lx: tipL.x, ly: tipL.y, rx: tipR.x, ry: tipR.y, z: tipL.z });
  if (player.trail.length > 36) player.trail.shift();

  // 隕石出現（加速中は出現も速まる＝密度増でリスク上昇）
  spawnTimer -= dt * boost;
  if (spawnTimer <= 0) {
    spawnMeteor();
    // 時間経過で同時出現の確率が上がる
    if (Math.random() < Math.min(0.2 + playTime * 0.012, 0.6)) spawnMeteor();
    spawnTimer = spawnInterval();
  }

  // 隕石更新

  // 隕石同士の衝突（等質量の弾性跳ね返り＋火花）
  for (let i = 0; i < meteors.length; i++) {
    for (let j = i + 1; j < meteors.length; j++) {
      const a = meteors[i], b = meteors[j];
      const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
      const rs = a.r + b.r;
      const d2 = dx * dx + dy * dy + dz * dz;
      if (d2 >= rs * rs || d2 < 1e-6) continue;
      const d = Math.sqrt(d2);
      const nx = dx / d, ny = dy / d, nz = dz / d;
      // z成分の速度は全体速度×vzMul（視点方向へ負）
      const avz = -vz * a.vzMul, bvz = -vz * b.vzMul;
      const rel = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny + (bvz - avz) * nz;
      if (rel < 0) {   // 接近中のみ反発
        a.vx += rel * nx; a.vy += rel * ny;
        b.vx -= rel * nx; b.vy -= rel * ny;
        a.vzMul = Math.max(0.2, Math.min(2.4, -(avz + rel * nz) / vz));
        b.vzMul = Math.max(0.2, Math.min(2.4, -(bvz - rel * nz) / vz));
        collideBurst((a.x + b.x) / 2, (a.y + b.y) / 2, (a.z + b.z) / 2);
      }
      // めり込み解消（互いに押し離す）
      const push = (rs - d) / 2;
      a.x -= nx * push; a.y -= ny * push; a.z -= nz * push;
      b.x += nx * push; b.y += ny * push; b.z += nz * push;
    }
  }

  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.z -= vz * m.vzMul * worldMul * dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.rot += m.vr * dt;

    // 自機プレーン通過時に衝突判定
    if (!m.passed && m.z <= Z0 + 40) {
      m.passed = true;
      const dist = Math.hypot(m.x - player.x, m.y - player.y);
      const hitR = m.r * 0.85 + player.r * 0.7;
      if (dist < hitR) {
        if (boostInputActive() || boost > 1.01) forceCancelBoost();
        if (player.inv <= 0) {
          player.lives--;
          playSfx(player.lives <= 0 ? "gameOver" : "hit");
          player.inv = 2;
          explode(player.x, player.y, Z0, true);
          if (player.lives <= 0) {
            state = ST_OVER;
            syncAffiliateLink();
            gameOverFlow = GAME_OVER_FLOW_TIME;
            best = Math.max(best, Math.floor(score));
            localStorage.setItem("mr3d_best", best);
          }
        }
        explode(m.x, m.y, m.z, false);
        meteors.splice(i, 1);
        continue;
      } else {
        if (dopamineActive() && nearMissCooldown <= 0 && dist < hitR + NEAR_MISS_MARGIN) {
          triggerNearMissBurst(player.x, player.y, m);
        }
        if (state === ST_PLAY) {
          playSfx("pass");
          score += 60 * boost * scoreMultiplier(); // 回避ボーナス（加速中は増）
        }
      }
    }
    if (m.z < ZCUT) meteors.splice(i, 1);
  }

  // パーティクル
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
  }

  // 星（ゆっくり手前へ流す）
  for (const s of stars) {
    s.z -= vz * 0.45 * boost * dt;
    if (s.z < Z0 * 0.7) {
      s.z = ZFAR;
      s.x = (Math.random() - 0.5) * 2 * limX() * 6;
      s.y = (Math.random() - 0.5) * 2 * limY() * 6;
    }
  }
}

function updateGameOverFlow(dt) {
  gameOverFlow = Math.max(0, gameOverFlow - dt);
  if (shake > 0) shake = Math.max(0, shake - dt * 2);

  const vz = meteorSpeed();
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.z -= vz * m.vzMul * worldMul * dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.rot += m.vr * dt;
    if (m.z < ZCUT) meteors.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
  }

  for (const s of stars) {
    s.z -= vz * 0.45 * boost * dt;
    if (s.z < Z0 * 0.7) {
      s.z = ZFAR;
      s.x = (Math.random() - 0.5) * 2 * limX() * 6;
      s.y = (Math.random() - 0.5) * 2 * limY() * 6;
    }
  }
}

/* ---------- 描画 ---------- */
let gridScroll = 0;

function drawScene(d, col, dt) {
  ctx.strokeStyle = col;
  ctx.fillStyle = col;

  // --- 星（加速中は残像的な軌跡を引く） ---
  const starStreakZ = boostAmount() * STAR_STREAK_Z_MAX;
  for (const s of stars) {
    const p = proj(s.x, s.y, s.z, d);
    if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) continue;
    const r = Math.max(0.6, 2.6 * p.s * 3);
    if (starStreakZ > 1) {
      // 星が来た方向（奥側）へ尾を引く＝ワープ的な流れ
      const pb = proj(s.x, s.y, s.z + starStreakZ, d);
      ctx.globalAlpha = 0.6;
      ctx.lineWidth = Math.max(0.8, r * 0.8);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y); ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    } else {
      ctx.globalAlpha = 0.9;
      ctx.fillRect(p.x - r / 2, p.y - r / 2, r, r);
    }
  }
  ctx.globalAlpha = 1;

  // --- 通路グリッド（床・天井） ---
  const floorY = limY() * 1.28;
  const gw = limX() * 1.35;
  const SPACING = 700;
  const GRID_LEN = SPACING * 12;
  const gridHot = dopamineActive();
  const gridJx = gridHot ? Math.sin(playTime * 126) * 1.4 + Math.sin(playTime * 239) * 0.7 : 0;
  const gridJy = gridHot ? Math.cos(playTime * 151) * 1.1 + Math.sin(playTime * 217) * 0.5 : 0;
  const gridProj = (x, y, z) => {
    const p = proj(x, y, z, d);
    return gridHot ? { x: p.x + gridJx, y: p.y + gridJy, s: p.s } : p;
  };
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.55;
  // 横線（奥から手前へスクロール）
  for (let i = 0; i < 12; i++) {
    const z = Z0 + 150 + (((i * SPACING - gridScroll) % GRID_LEN) + GRID_LEN) % GRID_LEN;
    for (const yy of [floorY, -floorY]) {
      const a = gridProj(-gw, yy, z);
      const b = gridProj( gw, yy, z);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
  }
  // 縦線（奥行き方向）
  for (let i = -4; i <= 4; i++) {
    const x = (i / 4) * gw;
    for (const yy of [floorY, -floorY]) {
      const a = gridProj(x, yy, Z0 + 150);
      const b = gridProj(x, yy, ZFAR);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // --- 隕石（奥から順に） ---
  const sorted = meteors.slice().sort((a, b) => b.z - a.z);
  for (const m of sorted) {
    const p = proj(m.x, m.y, m.z, d);
    const pr = m.r * p.s;
    if (pr < 1.2) continue;
    ctx.beginPath();
    const n = m.verts.length;
    for (let i = 0; i < n; i++) {
      const a = m.rot + (i / n) * Math.PI * 2;
      const rr = pr * m.verts[i];
      const vx = p.x + Math.cos(a) * rr;
      const vy = p.y + Math.sin(a) * rr;
      i === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
    }
    ctx.closePath();
    ctx.globalAlpha = 0.5;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.lineWidth = Math.max(1.5, pr * 0.06);
    ctx.stroke();
    // クレーター（隕石表面より手前に浮かせて立体的に見せる）
    // 飛び出しは見かけサイズ(pr)に比例：遠い隕石ではごく僅か、近いほど強い。
    // 画面面（自機）より手前へ出ることも許容し、上限は視差の融合限界（ゴースト防止）だけ。
    ctx.globalAlpha = 0.4;
    const popMag = Math.min(pr * 0.11, 6);   // 6 = 片眼あたりの飛び出し上限(px)
    const popDX = -d * popMag;
    const ca = Math.cos(m.rot), sa = Math.sin(m.rot);
    for (const c of [[-0.3, -0.2, 0.22], [0.32, 0.28, 0.14], [0.05, -0.35, 0.10]]) {
      const rx = c[0] * ca - c[1] * sa, ry = c[0] * sa + c[1] * ca;
      ctx.beginPath();
      ctx.arc(p.x + rx * pr + popDX, p.y + ry * pr, pr * c[2], 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // --- パーティクル ---
  for (const pt of particles) {
    const p = proj(pt.x, pt.y, pt.z, d);
    const r = Math.max(1, pt.r * p.s * pt.life * 2);
    ctx.globalAlpha = Math.min(1, pt.life * 2);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // --- ドーパミン発動リング ---
  for (const ring of dopamineRings) {
    const t = ring.age / ring.life;
    const scale = ring.scale || 1;
    const p = proj(ring.x, ring.y, ring.z, d);
    const rr = (80 + 300 * t) * scale * p.s;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = Math.max(0, 0.65 * (1 - t));
    ctx.lineWidth = Math.max(1.5, (8 - 5 * t) * scale * p.s);
    ctx.shadowColor = col;
    ctx.shadowBlur = 18 * (1 - t);
    ctx.beginPath();
    ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // --- 自機の軌跡（翼端から伸びる半透明ライン） ---
  if (state === ST_PLAY && player.trail.length > 1) {
    const tr = player.trail;
    const trailHot = dopamineActive();
    for (const side of ["l", "r"]) {
      for (let i = 1; i < tr.length; i++) {
        const a = tr[i - 1], b = tr[i];
        const frac = i / tr.length;                 // 新しい区間ほど濃く太く
        const p0 = proj(side === "l" ? a.lx : a.rx, side === "l" ? a.ly : a.ry, a.z, d);
        const p1 = proj(side === "l" ? b.lx : b.rx, side === "l" ? b.ly : b.ry, b.z, d);
        if (trailHot) {
          ctx.globalAlpha = 0.12 + 0.26 * frac;
          ctx.lineWidth = 5 + 9 * frac;
          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 0.5 * frac;
        ctx.lineWidth = 1.5 + 5.5 * frac;
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }

  // --- 自機 ---
  if (state === ST_PLAY || state === ST_OVER) {
    if (state === ST_OVER) return; // 撃墜済み
    if (player.inv > 0 && Math.floor(player.inv * 10) % 2 === 0) return; // 無敵点滅
    // 機体を3D座標で定義して投影（機首が奥＝画面奥へ向かって飛んでいる）
    const sr = player.r;
    const hot = dopamineActive();
    const jitterX = hot ? Math.sin(playTime * 95) * 3.0 + Math.sin(playTime * 171) * 1.4 : 0;
    const jitterY = hot ? Math.cos(playTime * 113) * 2.4 + Math.sin(playTime * 149) * 1.0 : 0;
    const P = (mx, my, mz) => {
      const w = shipPt(mx, my, mz);
      return proj(w.x + jitterX, w.y + jitterY, w.z, d);
    };
    const nose  = P(0, -0.05, 5.0);        // 機首（一番奥）
    const midR  = P( 0.45,  0.05, 1.0);
    const midL  = P(-0.45,  0.05, 1.0);
    const tipR  = P( 1.5,   0.4, -0.5);    // 翼端（手前）
    const tipL  = P(-1.5,   0.4, -0.5);
    const rearR = P( 0.4,   0.35, -0.6);
    const rearL = P(-0.4,   0.35, -0.6);
    const tailB = P(0,      0.5, -0.6);    // 尾部下端
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(nose.x, nose.y);
    ctx.lineTo(midR.x, midR.y);
    ctx.lineTo(tipR.x, tipR.y);
    ctx.lineTo(rearR.x, rearR.y);
    ctx.lineTo(tailB.x, tailB.y);
    ctx.lineTo(rearL.x, rearL.y);
    ctx.lineTo(tipL.x, tipL.y);
    ctx.lineTo(midL.x, midL.y);
    ctx.closePath();
    ctx.globalAlpha = 0.45;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.stroke();
    // 機首への稜線（奥行きを強調）
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(nose.x, nose.y); ctx.lineTo(tailB.x, tailB.y); ctx.stroke();
    // 垂直尾翼
    const finT = P(0, -0.85, -0.3);
    const finF = P(0, -0.05, 1.2);
    const finB = P(0,  0.2, -0.6);
    ctx.beginPath();
    ctx.moveTo(finF.x, finF.y); ctx.lineTo(finT.x, finT.y); ctx.lineTo(finB.x, finB.y);
    ctx.closePath();
    ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1;
    ctx.stroke();
    // エンジンノズル（手前側＝こちらを向いている）と炎
    // 加速中は噴射が長く・太くなる
    const bAmt = boostAmount();
    const fl = 0.6 + Math.random() * 0.5;
    const flameLen = 1.6 * fl * (1 + bAmt * 1.8);
    const flameW = 0.1 * (1 + bAmt * 0.8);
    for (const ex of [-0.22, 0.22]) {
      const e = P(ex, 0.32, -0.6);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, 0.15 * sr * e.s, 0, Math.PI * 2);
      ctx.stroke();
      // 炎は視点側（手前）へ伸びる
      const t  = P(ex, 0.36, -0.6 - flameLen);
      const e1 = P(ex - flameW, 0.32, -0.6);
      const e2 = P(ex + flameW, 0.32, -0.6);
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      ctx.moveTo(e1.x, e1.y); ctx.lineTo(t.x, t.y); ctx.lineTo(e2.x, e2.y);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawHUD() {
  ctx.fillStyle = "#ccc";
  ctx.strokeStyle = "#ccc";
  ctx.textBaseline = "top";

  if (state === ST_PLAY) {
    ctx.font = "bold 22px monospace";
    ctx.textAlign = "left";
    const scoreText = "SCORE " + Math.floor(score);
    if (dopamineActive()) {
      const pulse = 0.65 + Math.sin(performance.now() * 0.018) * 0.35;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.globalAlpha = 0.18 + pulse * 0.08;
      ctx.strokeStyle = "#00ffff";
      ctx.shadowColor = "#00ffff";
      ctx.shadowBlur = 30 + pulse * 14;
      ctx.lineWidth = 10;
      ctx.strokeText(scoreText, 18, 14);

      ctx.globalAlpha = 0.16 + pulse * 0.08;
      ctx.strokeStyle = "#ff0040";
      ctx.shadowColor = "#ff0040";
      ctx.shadowBlur = 22 + pulse * 10;
      ctx.lineWidth = 6;
      ctx.strokeText(scoreText, 18, 14);

      ctx.globalAlpha = 0.35 + pulse * 0.15;
      ctx.strokeStyle = "#ffffff";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 12 + pulse * 8;
      ctx.lineWidth = 2;
      ctx.strokeText(scoreText, 18, 14);

      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#00ffff";
      ctx.shadowBlur = 10 + pulse * 8;
      ctx.fillText(scoreText, 18, 14);
      ctx.restore();
    } else if (boost > 1.03) {
      ctx.save();
      ctx.fillStyle = "#f8ffff";
      ctx.fillText(scoreText, 18, 14);
      ctx.restore();
    } else {
      ctx.fillText(scoreText, 18, 14);
    }
    ctx.font = "16px monospace";
    ctx.fillText("BEST  " + best, 18, 42);
    if (boost > 1.03) {
      const multText = dopamineActive() ? "  SCORE ×" + DOPAMINE_SCORE_MULT.toFixed(1) : "";
      ctx.fillText("BOOST ×" + boost.toFixed(2) + multText, 18, 64);
    }
    // 残機
    ctx.textAlign = "right";
    for (let i = 0; i < player.lives; i++) {
      const x = W - 24 - i * 30, y = 20;
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x + 9, y + 18); ctx.lineTo(x - 9, y + 18);
      ctx.closePath();
      ctx.fill();
    }
    ctx.font = "13px monospace";
    ctx.globalAlpha = 0.6;
    const helpText = mobileQuery.matches
      ? "下部: BOOST / SLOW / 停止 / 設定"
      : "Z:加速  Shift:低速  G:2D  +/-:立体感  Space:停止";
    ctx.fillText(helpText, W - 18, 50);
    ctx.globalAlpha = 1;

    if (paused) {
      centerText("PAUSE", 48, -20);
      centerText(mobileQuery.matches ? "下部ボタンで再開" : "スペースキーで再開", 18, 30);
    }
  } else if (state === ST_TITLE) {
    centerText("3D ASTEROID", 54, -130);
    ctx.font = "17px sans-serif";
    ctx.textAlign = "center";
    ctx.globalAlpha = 0.9;
    const lines = mobileQuery.matches
      ? [
          "🕶 赤青3Dメガネを装着（左目=赤 / 右目=青）",
          "",
          "画面の奥から迫りくる隕石を避け続けろ！",
          "",
          "操作: ドラッグ / 左下スティック",
          "BOOST / SLOW / 停止 は下部ボタン　3D/± は設定",
        ]
      : [
          "🕶 赤青3Dメガネを装着してください（左目=赤 / 右目=青）",
          "",
          "画面の奥から迫りくる隕石を避け続けろ！",
          "",
          "操作: 矢印 / WASD / ドラッグ　Z: 加速　Shift: 低速",
          "Z加速中は速く危険だが高得点　G: 3D⇔2D　＋/−: 立体感",
        ];
    lines.forEach((t, i) => ctx.fillText(t, W / 2, H / 2 - 55 + i * 30));
    ctx.globalAlpha = 1;
    if (Math.floor(performance.now() / 600) % 2 === 0)
      centerText(mobileQuery.matches ? "― タップでスタート ―" : "― スペースキー または クリックでスタート ―", 22, 160);
  } else if (state === ST_OVER) {
    if (gameOverFlow > 0) return;
    centerText("GAME OVER", 54, -80);
    centerText("SCORE  " + Math.floor(score), 30, -10);
    if (Math.floor(score) >= best) centerText("★ ベスト記録更新！ ★", 20, 30);
    else centerText("BEST  " + best, 20, 30);
    if (Math.floor(performance.now() / 600) % 2 === 0)
      centerText(mobileQuery.matches ? "タップでリトライ" : "スペースキーでリトライ", 20, 90);
  }
}

function centerText(t, size, dy) {
  ctx.font = "bold " + size + "px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(t, W / 2, H / 2 + dy);
}

function drawDopamineFlash() {
  if (dopamineFlash <= 0) return;
  const t = dopamineFlash / DOPAMINE_FLASH_TIME;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.globalAlpha = 0.28 * t;
  ctx.fillStyle = "#eaffff";
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.18 * t;
  ctx.fillStyle = "#00ffff";
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

/* ---------- メインループ ---------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  const flowingAfterGameOver = state === ST_OVER && gameOverFlow > 0;
  if (state === ST_PLAY && !paused) update(dt);
  else if (flowingAfterGameOver) updateGameOverFlow(dt);
  syncAffiliateLink();
  syncTouchControls();
  syncBoostSound();

  const shouldScrollGrid = state === ST_TITLE || (state === ST_PLAY && !paused) || flowingAfterGameOver;
  if (shouldScrollGrid) {
    const scrollMul = state === ST_PLAY || flowingAfterGameOver ? worldMul : 0.3;
    gridScroll += meteorSpeed() * 0.6 * dt * scrollMul;
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  // 画面揺れ
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake * 24, (Math.random() - 0.5) * shake * 24);
  }

  if (anaglyph) {
    ctx.globalCompositeOperation = "lighter";
    drawScene(-1, "#ff0000", dt); // 左目 = 赤
    drawScene( 1, "#00ffff", dt); // 右目 = シアン
    ctx.globalCompositeOperation = "source-over";
  } else {
    drawScene(0, "#e8e8e8", dt);
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawDopamineFlash();
  drawHUD();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
